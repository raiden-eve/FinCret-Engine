<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCret Engine 0.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #34d399, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .score-glow { box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); border-color: #10b981 !important; }
    </style>
</head>
<body class="p-6 md:p-12">
    <nav class="flex justify-between items-center mb-12">
        <h1 class="text-2xl font-bold tracking-tighter">FIN<span class="gradient-text">CRET</span></h1>
        <div class="flex gap-6 text-sm font-medium text-slate-400">
            <a href="index.html" class="text-emerald-400">Auditor</a>
            <a href="workshop.html" class="hover:text-emerald-400 transition">Workshop</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2 glass rounded-3xl p-8 relative overflow-hidden">
            <h2 class="text-xl font-bold mb-4">Launch New Audit</h2>
            <textarea id="scriptInput" class="w-full h-40 bg-white/5 border border-white/10 rounded-2xl p-4 text-slate-200" placeholder="E.g., Why Gold is hitting ₹1.5L..."></textarea>
            <button onclick="runStrictAudit()" class="mt-6 bg-emerald-500 text-black font-bold py-3 px-8 rounded-full">Analyze Script</button>
        </div>

        <div class="glass rounded-3xl p-8 flex flex-col items-center justify-center text-center">
            <div id="scoreRing" class="w-40 h-40 rounded-full border-8 border-slate-800 flex items-center justify-center transition-all duration-500">
                <span id="scoreVal" class="text-5xl font-bold">0</span>
            </div>
            <p id="scoreFeedback" class="mt-6 text-sm text-slate-400 italic">"Waiting for input..."</p>
        </div>

        <div id="heatmapCard" class="glass rounded-3xl p-6 cursor-pointer border border-orange-500/30">
            <div class="w-10 h-10 bg-orange-500/20 rounded-lg flex items-center justify-center mb-4">🔥</div>
            <h4 class="font-bold">Niche Heatmap</h4>
            <p id="heatmapText" class="text-xs text-slate-400 mt-2">Loading trends...</p>
        </div>

        <div id="shadowCard" class="glass rounded-3xl p-6 border border-purple-500/30">
            <div class="w-10 h-10 bg-purple-500/20 rounded-lg flex items-center justify-center mb-4">👤</div>
            <h4 class="font-bold">Shadow Gap</h4>
            <p id="shadowText" class="text-xs text-slate-400 mt-2">Analyzing gaps...</p>
        </div>
    </main>

    <script>
        // 1. DETERMINISTIC AUDIT (No Randomness)
        function runStrictAudit() {
            const text = document.getElementById('scriptInput').value.trim().toLowerCase();
            const val = document.getElementById('scoreVal');
            const feedback = document.getElementById('scoreFeedback');
            const ring = document.getElementById('scoreRing');

            if (text.length < 15) {
                val.innerText = "08";
                feedback.innerText = "❌ Content too short for algorithm pick-up.";
                ring.style.borderColor = "#ef4444";
                return;
            }

            let score = 20; // Base effort
            if (text.includes("gold") || text.includes("silver")) score += 35;
            if (text.includes("crash") || text.includes("iran") || text.includes("war")) score += 30;
            if (text.includes("fii") || text.includes("nifty")) score += 15;

            score = Math.min(score, 99);
            val.innerText = score;
            ring.style.borderColor = score > 70 ? "#10b981" : "#3b82f6";
            feedback.innerText = score > 70 ? "🔥 High Trend Match!" : "📉 Add March 2026 keywords.";
        }

        // 2. ROTATION LOGIC
        const trends = ["#GoldCrash +42%", "#SME_IPO_Bubble +18%", "#IranOilSpike +30%"];
        const gaps = ["Akshat fans want Real Estate", "Tax-saving for Gen Z", "Rural Fintech Needs"];
        let idx = 0;

        setInterval(() => {
            idx = (idx + 1) % 3;
            document.getElementById('heatmapText').innerText = trends[idx];
            document.getElementById('shadowText').innerText = gaps[idx];
        }, 4000);

        // 3. HEATMAP CLICK
        document.getElementById('heatmapCard').onclick = () => alert("MARCH 2026: Gold is at ₹14,809/g. Market is in Fear mode.");
    </script>
</body>
</html>
