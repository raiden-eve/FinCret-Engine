<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCret Workshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-12">
    <nav class="flex justify-between mb-12">
        <h1 class="text-2xl font-bold"><a href="index.html">FIN<span class="text-emerald-400">CRET</span></a></h1>
        <a href="index.html" class="text-slate-400">Back to Auditor</a>
    </nav>

    <h2 class="text-3xl font-bold mb-8 text-emerald-400">Project Workshop</h2>
    <div id="projectList" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        </div>

    <button onclick="addNewProject()" class="fixed bottom-8 right-8 bg-emerald-500 text-black font-bold py-4 px-8 rounded-full shadow-xl">+ New Project</button>

    <script>
        const list = document.getElementById('projectList');

        // LOAD FROM MEMORY
        function loadProjects() {
            const saved = JSON.parse(localStorage.getItem('fincret_data') || '[]');
            list.innerHTML = '';
            saved.forEach(title => {
                const card = document.createElement('div');
                card.className = "glass p-6 rounded-2xl";
                card.innerHTML = `<p class='font-bold'>${title}</p><span class='text-xs text-slate-500'>Draft</span>`;
                list.appendChild(card);
            });
        }

        // SAVE TO MEMORY
        function addNewProject() {
            const t = prompt("Project Title:");
            if(t) {
                const saved = JSON.parse(localStorage.getItem('fincret_data') || '[]');
                saved.push(t);
                localStorage.setItem('fincret_data', JSON.stringify(saved));
                loadProjects();
            }
        }

        function loadProjects() {
    const saved = JSON.parse(localStorage.getItem('fincret_data') || '[]');
    list.innerHTML = '';
    saved.forEach((title, index) => {
        const card = document.createElement('div');
        card.className = "glass p-6 rounded-2xl relative group";
        card.innerHTML = `
            <p class='font-bold text-slate-200'>${title}</p>
            <span class='text-xs text-slate-500 uppercase tracking-widest'>Project #${index + 1}</span>
            <button onclick="deleteProject(${index})" class="absolute top-4 right-4 text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition">✕</button>
        `;
        list.appendChild(card);
    });
}

function deleteProject(index) {
    if(confirm("Delete this project?")) {
        let saved = JSON.parse(localStorage.getItem('fincret_data') || '[]');
        saved.splice(index, 1);
        localStorage.setItem('fincret_data', JSON.stringify(saved));
        loadProjects();
    }
}
    </script>
</body>
</html>
