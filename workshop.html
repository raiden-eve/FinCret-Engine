<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://img.icons8.com/fluency/48/emerald-stone.png">
<meta property="og:title" content="FinCret Engine - AI Content Auditor">
<meta property="og:description" content="Audit your finance content for the March 2026 market crash. Built for creators.">
<meta property="og:image" content="https://images.unsplash.com/photo-1611974708305-96dd0ba18d36?auto=format&fit=crop&w=1200&q=80">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCret Workshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-12">
    <nav class="flex justify-between mb-12">
        <h1 class="text-2xl font-bold"><a href="index.html">FIN<span class="text-emerald-400">CRET</span></a></h1>
        <a href="index.html" class="text-slate-400">Back to Auditor</a>
    </nav>

    <h2 class="text-3xl font-bold mb-8 text-emerald-400">Project Workshop</h2>
    <div id="projectList" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        </div>

    <button onclick="addNewProject()" class="fixed bottom-8 right-8 bg-emerald-500 text-black font-bold py-4 px-8 rounded-full shadow-xl">+ New Project</button>

    <script>
const list = document.getElementById('projectList');

// 1. THE LOAD & RENDER ENGINE
function loadProjects() {
    const saved = JSON.parse(localStorage.getItem('fincret_data') || '[]');
    list.innerHTML = ''; // Clear the list first
    
    saved.forEach((title, index) => {
        const card = document.createElement('div');
        card.className = "glass p-6 rounded-2xl relative group border border-white/5 hover:border-emerald-500/30 transition";
        card.innerHTML = `
            <p class='font-bold text-slate-200'>${title}</p>
            <span class='text-[10px] text-slate-500 uppercase tracking-widest mt-2 block'>Project #${index + 1}</span>
            
            <button onclick="deleteProject(${index})" class="absolute top-4 right-4 text-slate-500 hover:text-red-400 transition text-sm">
                ✕
            </button>
        `;
        list.appendChild(card);
    });
}

// 2. THE DELETE LOGIC
function deleteProject(index) {
    // A quick confirmation so you don't delete by accident
    if(confirm("Are you sure you want to delete this project?")) {
        let saved = JSON.parse(localStorage.getItem('fincret_data') || '[]');
        saved.splice(index, 1); // Remove the item at that position
        localStorage.setItem('fincret_data', JSON.stringify(saved)); // Save the new list
        loadProjects(); // Refresh the screen
    }
}

// 3. THE ADD LOGIC
function addNewProject() {
    const t = prompt("Enter Project Title (e.g., Gold Strategy 2026):");
    if(t && t.trim().length > 0) {
        const saved = JSON.parse(localStorage.getItem('fincret_data') || '[]');
        saved.push(t);
        localStorage.setItem('fincret_data', JSON.stringify(saved));
        loadProjects();
    }
}

// Start the engine
loadProjects();
    </script>
</body>
</html>
